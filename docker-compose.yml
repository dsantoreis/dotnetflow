services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /workspace
    command: ["bash", "-lc", "dotnet --info && sleep infinity"]
    volumes:
      - ./:/workspace
    ports:
      - "8081:8080"
  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: ["sh", "-lc", "npm ci && npm run dev -- --host"]
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
