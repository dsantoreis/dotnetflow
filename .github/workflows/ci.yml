name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Build & Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore api/DotnetFlow.slnx

      - name: Build
        run: dotnet build api/DotnetFlow.slnx --configuration Release --no-restore

      - name: Test with Coverage
        run: >
          dotnet test api/DotnetFlow.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Generate Coverage Report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool 2>/dev/null || true
          reportgenerator \
            -reports:./coverage/**/coverage.cobertura.xml \
            -targetdir:./coverage/report \
            -reporttypes:TextSummary
          cat ./coverage/report/Summary.txt

      - name: Check Coverage Threshold
        run: |
          LINE_COV=$(grep -oP 'Line coverage: \K[0-9.]+' ./coverage/report/Summary.txt)
          echo "Line coverage: ${LINE_COV}%"
          if (( $(echo "$LINE_COV < 80" | bc -l) )); then
            echo "::error::Coverage ${LINE_COV}% is below 80% threshold"
            exit 1
          fi

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dotnetflow:ci .
