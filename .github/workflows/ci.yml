name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Build & Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore api/DotnetFlow.slnx

      - name: Build
        run: dotnet build api/DotnetFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test api/DotnetFlow.slnx --configuration Release --no-build --verbosity normal

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dotnetflow:ci .
